# Content
tags:
  title: 標籤

excerpt_link: more
archive_yearly: true
share: true
search: true

# Use turbolinks.js (issue #21)
turbolinks: false 

# Hide menus when screen width is wide
hideMenu: true

adsense:
  enable: true
  client: 'ca-pub-1532347766435780'   # AdSense publisher ID (data-ad-client)
  # Standalone display ad units — paste each unit's data-ad-slot here. Blank disables it.
  in_slot:
    post_bottom: '3786040804'   # in-article ad at the bottom of each post
    post_toc: '2383750630'      # long vertical (skyscraper) ad under the post table-of-contents
    about_bottom: '4205922593'  # autorelaxed (Multiplex) ad at the bottom of the about page
  # Native "In-feed" ads that blend into the home / archive / projects / photography feeds.
  # Create an In-feed ad unit in AdSense for each grid, then paste that unit's
  # data-ad-slot and data-ad-layout-key below. Leave either field blank to
  # disable that grid's ad (nothing is rendered until both are filled in).
  in_feed:
    post_list:          # native ad in the home post list (index)
      slot: '9564236655'
      layout_key: '-5l+cv+1h-cb+ei'
      every: 5  # show one ad after every N posts (pages hold per_page:5, so keep <=5)
    archive:            # native ad in the archive / tag listings (replaces the old archive_list banner)
      slot: '9607634530'
      layout_key: '-hx-7+2w-11-86'
      every: 5  # show one ad after every N entries (pages hold per_page:5, so keep <=5)
    projects:
      slot: '7350539224'
      layout_key: '-6b+dr+a-e9+f0'
      every: 6  # show one ad after every N project cards
    photography:
      slot: '8252557356'
      layout_key: '-6t+ed+2i-1n-4w'
      every: 8  # show one ad after every N photos

#toc: true
toc:
  list_number: false 

# Miscellaneous
google_analytics: 'G-4YMNTX9S2Q'
favicon: /img/favicon.ico

# less
